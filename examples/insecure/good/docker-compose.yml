# GOOD hardened stack — `/docker-emmet examples/insecure/good` should report no issues.
# Dropped capabilities, segmented networks, healthchecks, file-based secrets, limits, log rotation.

secrets:
  db_password:
    file: ./secrets/db_password.txt            # value lives outside the Compose file and git

services:
  proxy:
    build: ./
    ports: ["80:80"]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]                # only what a proxy needs to bind :80 as non-root
    security_opt: ["no-new-privileges:true"]
    depends_on:
      app:
        condition: service_healthy
    networks: [frontend]
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 128M, cpus: "0.5" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  app:
    build: ./
    expose: ["3000"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      DATABASE_URL: postgres://app@db:5432/appdb
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}   # interpolated; fails loudly if unset
    depends_on:
      db:
        condition: service_healthy             # waits for pg_isready, not just container start
      cache:
        condition: service_healthy
    networks: [frontend, backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  db:
    image: postgres:16.4-alpine
    secrets: [db_password]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password   # _FILE convention — never an env value
      POSTGRES_DB: appdb
    volumes:
      - pg_data:/var/lib/postgresql/data       # named volume — survives `docker compose down`
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [backend]                        # backend only — not reachable from the proxy
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  cache:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 128M, cpus: "0.25" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  frontend:
  backend:

volumes:
  pg_data:
