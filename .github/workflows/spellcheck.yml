name: spellcheck

# Checks spelling across the handbook, README, and RULES.md with `typos` — a fast,
# low-false-positive spellchecker.  Configuration lives in .typos.toml.

on:
  push:
    paths:
      - '**/*.md'
      - '.typos.toml'
      - '.github/workflows/spellcheck.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.typos.toml'

permissions:
  contents: read

jobs:
  typos:
    name: typos — handbook & docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install typos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            --repo crate-ci/typos \
            --pattern '*x86_64-unknown-linux-musl.tar.gz' \
            --output typos.tar.gz \
            --clobber
          tar -xzf typos.tar.gz ./typos
          sudo mv typos /usr/local/bin/
          typos --version

      - name: Check spelling
        run: typos --config .typos.toml
